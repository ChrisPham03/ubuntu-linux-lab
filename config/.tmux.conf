# ============================================================================
#  tmux configuration — Ubuntu Linux Lab
# ============================================================================

# Use Ctrl-a as prefix (easier than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Mouse support (scroll, select panes, resize)
set -g mouse on

# True-color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Vi-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection

# Intuitive split keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Quick reload
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# Faster key repeats
set -sg escape-time 10

# Larger history
set -g history-limit 50000

# ---- Status bar -----------------------------------------------------------
set -g status-position bottom
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left  '#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]'
set -g status-right '#[fg=#a6e3a1]%Y-%m-%d #[fg=#f9e2af]%H:%M '
set -g status-left-length 30

setw -g window-status-current-style 'bg=#f5c2e7 fg=#1e1e2e bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-format ' #I:#W '
